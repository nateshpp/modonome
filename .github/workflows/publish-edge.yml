name: publish-edge

on:
  push:
    branches: [ main ]

jobs:
  publish:
    runs-on: ubuntu-latest
    
    # Mandatory permissions block required to generate OIDC cryptographic identity tokens
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout baseline
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js Environment
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # OIDC trusted publishing requires npm 11.5.0 or newer; Node 22 ships an older npm
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install Secure Dependencies
        run: npm ci

      # Auth resolves OIDC trusted publishing first; NODE_AUTH_TOKEN is the fallback when set
      - name: Publish to next
        run: npm publish --tag next --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
