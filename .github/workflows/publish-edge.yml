name: publish-edge

on:
  push:
    branches: [ main ]

jobs:
  publish:
    runs-on: ubuntu-latest
    
    # Mandatory permissions block required to generate OIDC cryptographic identity tokens
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout baseline
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Stripping registry-url prevents writing placeholder tokens that break OIDC handshakes
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Secure Dependencies
        run: npm ci

      - name: Publish to next
        run: npm publish --tag next --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
