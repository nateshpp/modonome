name: publish-edge

on:
  push:
    branches: [ main ]

jobs:
  publish:
    runs-on: ubuntu-latest
    
    # Mandatory permissions block required to generate OIDC cryptographic identity tokens
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout baseline
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js Environment
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # OIDC trusted publishing requires npm 11.5.0 or newer; Node 22 ships an older npm
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install Secure Dependencies
        run: npm ci

      # Each push gets a unique prerelease so edge runs never collide on an existing version.
      # The version is set at publish time only and is not committed back to the repo.
      - name: Set unique edge version
        id: edge
        run: |
          BASE=$(node -p "require('./package.json').version.split('-')[0]")
          EDGE_VERSION="${BASE}-next.${GITHUB_RUN_NUMBER}"
          npm pkg set version="$EDGE_VERSION"
          echo "version=$EDGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing edge version $EDGE_VERSION"

      - name: Skip if already published
        id: check
        run: |
          FOUND=$(npm view "modonome@${{ steps.edge.outputs.version }}" version 2>/dev/null || echo "")
          if [ "$FOUND" = "${{ steps.edge.outputs.version }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Auth resolves OIDC trusted publishing first; NODE_AUTH_TOKEN is the fallback when set
      - name: Publish to next
        if: steps.check.outputs.skip == 'false'
        run: npm publish --tag next --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
