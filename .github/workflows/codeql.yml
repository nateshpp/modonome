name: codeql

# Static analysis for common code-quality and security flaws (OpenSSF Best
# Practices: static_analysis). Runs on pushes to main, pull requests, and on a
# weekly schedule so newly published CodeQL queries reach existing code.
# SARIF upload requires GitHub Advanced Security on private repos; on public
# repos it is free and works without restriction.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1" # Mondays at 04:27 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload results to the Security tab
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # github/codeql-action is GitHub-maintained; the v3 major tag is tracked by
      # Dependabot (see .github/dependabot.yml) and may be pinned to a SHA later.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
