name: codeql

# Static analysis for common code-quality and security flaws (OpenSSF Best
# Practices: static_analysis). Runs on pushes to main, on pull requests, and on
# a weekly schedule so newly published CodeQL queries reach existing code.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1" # Mondays at 04:27 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload results to the Security tab
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # github/codeql-action is GitHub-maintained; the v3 major tag is tracked by
      # Dependabot (see .github/dependabot.yml) and may be pinned to a SHA later.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      # The analysis runs and surfaces results in the Security tab once a maintainer
      # enables code scanning (Settings -> Security -> Code scanning; free on public
      # repos). Until then the SARIF upload returns a configuration error, so this
      # step is non-blocking. After enabling code scanning, remove continue-on-error
      # to make CodeQL an enforcing gate.
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        continue-on-error: true
        with:
          category: "/language:javascript-typescript"
