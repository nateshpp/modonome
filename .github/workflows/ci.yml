name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      - name: Drift guard
        run: node scripts/check-drift.mjs
      - name: Style check
        run: node scripts/check-style.mjs .
      - name: Tests
        run: node --test tests/*.test.mjs
      - name: Verify published artifact
        run: npm pack --dry-run
      - name: AgentProof
        run: node agentproof/runner.mjs

  ratchet:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      - name: Anti-gaming ratchet
        run: node scripts/guard-ratchet.mjs origin/${{ github.base_ref }}
