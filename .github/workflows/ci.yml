name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      - name: Drift guard
        run: node scripts/check-drift.mjs
      # On a pull request, run the house-style linter from the trusted base-branch
      # copy so a pull request cannot weaken the gate that judges it. The working
      # tree stays the pull request version, so the linter still inspects the change.
      - name: Load style linter from base branch
        if: github.event_name == 'pull_request'
        run: git checkout "origin/${{ github.base_ref }}" -- scripts/check-style.mjs
      - name: Style check
        run: node scripts/check-style.mjs .
      # Restore the pull request copy so later steps exercise the code under review.
      - name: Restore pull request style linter
        if: github.event_name == 'pull_request'
        run: git checkout HEAD -- scripts/check-style.mjs
      - name: Tests
        run: node --test tests/*.test.mjs
      - name: Verify published artifact
        run: npm pack --dry-run
      - name: AgentProof
        run: node agentproof/runner.mjs

  ratchet:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      # Run the anti-gaming ratchet from the trusted base-branch copy. The diff it
      # judges is the pull request's committed change set; the logic that judges
      # that diff stays the base-branch version, outside the pull request's reach.
      - name: Load ratchet from base branch
        run: git checkout "origin/${{ github.base_ref }}" -- scripts/guard-ratchet.mjs
      - name: Anti-gaming ratchet
        run: node scripts/guard-ratchet.mjs origin/${{ github.base_ref }}
