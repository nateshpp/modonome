name: ci

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  ratchet:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      # Snapshot freshness, the test suite, and AgentProof all run BEFORE the
      # base-branch checkouts below, which overwrite the gate scripts and the
      # attribution detector kernel with base versions. All three need to see
      # this branch's real files: snapshot hashing needs the real tree, and both
      # the test suite (tests/ratchet.test.mjs, tests/portability.test.mjs, etc.)
      # and AgentProof's ratchet scenarios spawn scripts/guard-ratchet.mjs by
      # path to test its own behavior, not to check this diff -- running them
      # after the base-branch checkout would silently test main's
      # guard-ratchet.mjs instead of this PR's.
      - name: Run snapshot freshness gate
        run: node scripts/snapshot.mjs . --check

      - name: Run tests gate
        run: node --test tests/*.test.mjs

      - name: Run AgentProof gate
        run: node agentproof/runner.mjs

      # Mandatory Base-Branch Checkouts matching check-self-application.mjs criteria
      # NOTE: These steps only run on pull requests where github.base_ref is defined.
      # On push events, github.base_ref is empty, so these are skipped to prevent
      # "fatal: invalid reference: origin/" errors. See: https://github.com/nateshpp/modonome/pull/57
      - name: Load guard-ratchet.mjs from the base branch
        if: github.event_name == 'pull_request'
        run: git checkout "origin/${{ github.base_ref }}" -- scripts/guard-ratchet.mjs

      - name: Load check-style.mjs from the base branch
        if: github.event_name == 'pull_request'
        run: git checkout "origin/${{ github.base_ref }}" -- scripts/check-style.mjs

      # The attribution detector kernel: the branch/commit hygiene gate and the
      # detectors it consumes must also run from the base branch, so a PR cannot
      # weaken the check that judges its own branch name, commit identity, or
      # attribution signatures. detect-attribution.mjs uses bootstrap tolerance
      # because a PR that introduces it has no copy of it on the base branch yet.
      - name: Load repo-hygiene gate and detectors from the base branch
        if: github.event_name == 'pull_request'
        run: |
          git checkout "origin/${{ github.base_ref }}" -- scripts/check-repo-hygiene.mjs
          git checkout "origin/${{ github.base_ref }}" -- scripts/lib/branch-name.mjs
          git checkout "origin/${{ github.base_ref }}" -- scripts/lib/commit-identity.mjs
          git checkout "origin/${{ github.base_ref }}" -- scripts/lib/detect-attribution.mjs || echo "detect-attribution.mjs not on base yet (bootstrap PR)"

      # Unlike guard-ratchet.mjs and check-style.mjs above, this gate is new: the
      # first PR that introduces it has no prior version on the base branch to
      # load, so the checkout is skipped (not failed) when the base branch
      # doesn't have the file yet. Every PR after this one merges will find it
      # there and get the same trust-isolation the other two gates get.
      - name: Load check-decisions-authority.mjs from the base branch
        if: github.event_name == 'pull_request'
        run: |
          if git cat-file -e "origin/${{ github.base_ref }}:scripts/check-decisions-authority.mjs" 2>/dev/null; then
            git checkout "origin/${{ github.base_ref }}" -- scripts/check-decisions-authority.mjs
          else
            echo "scripts/check-decisions-authority.mjs not yet on base branch; skipping trust-isolation checkout (first introduction)."
          fi

      # Governance-relevant change assertion matching tests/ws-d-governed-change.test.mjs criteria
      - name: Governance-relevant change assertion
        run: node scripts/assert-governed-change.mjs origin/main

      # Core Pipeline Gates expected by check-self-application.mjs
      - name: Run drift guard gate
        run: node scripts/check-drift.mjs

      - name: Run style check gate
        run: node scripts/check-style.mjs .

      - name: Run repo hygiene gate
        run: node scripts/check-repo-hygiene.mjs

      - name: Run markdown governance gate
        run: node scripts/check-md-governance.mjs

      - name: Run architecture drift gate
        run: node scripts/check-architecture-drift.mjs

      - name: Run self-application conformance gate
        run: node scripts/check-self-application.mjs

      - name: Run decisions-authority gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/check-decisions-authority.mjs origin/main

      - name: Run license and adapter boundary gate
        run: node scripts/check-licenses.mjs

      - name: Run prompt behavioral regression gate
        run: node scripts/test-prompt-behavior.mjs

      - name: Run learning traceability gate
        run: node scripts/check-learning-traceability.mjs

      - name: Run capability promotion readiness gate
        run: node scripts/check-promotion-readiness.mjs

      - name: Run work item validation gate
        run: node scripts/check-work-items.mjs

      - name: Run checker engagement gate
        run: node scripts/check-checker-engagement.mjs

      - name: Install control-panel frontend dependencies
        run: npm install --prefix design-system && npm install --prefix apps/control-panel

      - name: Run design-system build
        run: npm run build --prefix design-system

      - name: Run control-panel typecheck and build
        run: npm run build --prefix apps/control-panel

      - name: Run control-panel governance gates
        run: npm run check:control-panel

      - name: Run anti-gaming ratchet gate
        run: node scripts/guard-ratchet.mjs origin/main

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Run drift guard gate
        run: node scripts/check-drift.mjs

      - name: Run style check gate
        run: node scripts/check-style.mjs .

      - name: Run repo hygiene gate
        run: node scripts/check-repo-hygiene.mjs

      - name: Run tests and coverage gate
        run: node --test --experimental-test-coverage --test-coverage-exclude='tests/**' --test-coverage-exclude='agentproof/**' --test-coverage-lines=80 --test-coverage-branches=66 --test-coverage-functions=80 tests/*.test.mjs
