name: Bug report
description: Something broke or behaved unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more detail you provide, the faster we can reproduce it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what did you get instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `npx modonome dry-run .`
        2. ...
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Full command output
      render: shell
    validations:
      required: false
  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: "e.g. 22.3.0"
    validations:
      required: true
  - type: input
    id: modonome-version
    attributes:
      label: Modonome version
      placeholder: "e.g. 0.1.0-alpha"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. macOS 14.5, Ubuntu 22.04"
    validations:
      required: true
