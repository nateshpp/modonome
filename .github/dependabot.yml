version: 2
updates:
  # Keep GitHub Actions (including github/codeql-action) current. Modonome pins
  # actions to SHAs where practical; Dependabot proposes the bumps for owner review.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # The engine itself has zero runtime dependencies, but dev/tooling manifests are
  # watched so any future dependency is surfaced for owner-reviewed updates.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
