# Modonome configuration. Safe defaults. Edit with care.
# The arming levers (autonomy_enabled, auto_merge, max_merges_per_day,
# repo_network_enabled) are read from the environment or CI in armed mode, so
# this file alone can never arm the engine.
schema_version: 1

autonomy_enabled: false
dry_run: true
auto_merge: false

max_attempts_per_item: 3
max_open_prs: 3
max_diff_lines: 400
lease_minutes: 60
max_merges_per_day: 0

remote_model_budget_usd_per_day: 0
local_model_only_by_default: true

require_branch_protection: true
require_codeowner_review: true
require_distinct_maker_checker: true
require_distinct_maker_checker_model: true

trusted_author_allowlist: []
protected_paths_extra: []
state_dir: .modonome

market_scan_enabled: false
owner_approval_required_for_new_claims: true

repo_network_enabled: false
repo_network_dry_run: true
share_raw_code_across_repos: false
share_repo_identifiers_by_default: false

# Snapshot utility. ci_mode is one of warn, fail, disabled (quote-free values are
# fine; disabled is used instead of off so YAML does not read it as a boolean).
snapshot:
  ci_mode: warn
  sign: false
  parser: heuristic
  token_budget: 120000
  strict_redact: false

roles:
  maker:
    runner: container
    model: claude-sonnet-4-6
  checker:
    runner: container
    model: claude-opus-4-8
  self-govern:
    runner: container
    model: claude-haiku-4-5
runners:
  local:
    labels: [self-hosted, mac-mini]
    cli_path: claude
  container:
    labels: [ubuntu-latest]
    cli_path: claude
models:
  claude-sonnet-4-6:
    provider: anthropic
  claude-opus-4-8:
    provider: anthropic
  claude-haiku-4-5:
    provider: anthropic
  local-default:
    provider: local
    base_url: http://mac-mini.local:11434
