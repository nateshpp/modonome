name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # These job names collide with Modonome's CI job names
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check drift (host-defined)
        run: echo "host drift check"

  ratchet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Anti-gaming ratchet (host-defined)
        run: echo "host ratchet"

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests (host-defined)
        run: npm test

  agentproof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Agentproof checks (host-defined)
        run: echo "host agentproof"
